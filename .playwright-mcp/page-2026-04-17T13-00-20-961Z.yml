        - paragraph [ref=e52]: Private Blockspace is built for high-stakes onchain markets where performance and confidentiality are mandatory, and independent verification and recovery paths are not negotiable.
        - paragraph [ref=e54]: This could apply to private exchanges and orderbooks, institutional financial rails, and trustless data marketplaces — use cases where positions, holdings, or proprietary data must remain private, yet the integrity and availability of that private state must be publicly verifiable.
    - generic [ref=e56]:

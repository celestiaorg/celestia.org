        - heading "How it works" [level=2] [ref=e58]
        - paragraph [ref=e59]: Operators publish verifiably encrypted state to Celestia via the Private Blockspace proxy.
        - paragraph [ref=e60]: The encrypted data is publicly available, and a public commitment anchors it to the protocol's onchain state, allowing anyone to verify availability and consistency without revealing the underlying data.
